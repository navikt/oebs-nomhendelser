server:
  port: 8080

spring:
  profiles:
    active: nais
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      jakarta:
        persistence:
          sharedCache:
            mode: ENABLE_SELECTIVE
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
    show-sql: false
    open-in-view: false
  kafka:
    client-id: oebs-nomhendelser
    consumer:
      group-id:  oebs-nomhendelser
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 100
    listener:
      ack-mode: record
    bootstrap-servers: localhost:9092
    properties:
      security:
        protocol: plaintext #SSL
      schema:
        registry:
          url: mock:8081

app:
  kafka:
    nomshendelse:
      topic: nom.skjermede-personer-status-v1
      auto-startup: true
    filter:
      debug-mode: false
      start-time: 2024-12-01T12:00:00
    retry-max-attempts: 2880
    retry-backoff-period-ms: 60000
    authorization-exception-retry-interval-secs: 60
  quartz:
    job-interval-secs: 300
  service:
    retry-attempt-1-delay-mins: 1
    retry-attempt-n-delay-mins: 60
    retry-max-attempts: 5

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics, quartz