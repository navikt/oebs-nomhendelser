apiVersion: nais.io/v1alpha1
kind: Application

metadata:
  name: oebs-nomhendelser-t1
  namespace: team-oebs
  labels:
    team: team-oebs

spec:
  image: {{ image }}
  port: 8080
  replicas:
    min: 1
    max: 1
    cpuThresholdPercentage: 50
  liveness:
    path: /internal/isalive
    initialDelay: 60
    timeout: 10
  readiness:
    path: /internal/isready
    initialDelay: 60
    timeout: 10
  resources:
    limits:
      cpu: 200m
      memory: 768Mi
    requests:
      cpu: 20m
      memory: 400Mi
  prometheus:
    enabled: true
    path: /actuator/prometheus
  kafka:
    pool: nav-dev
  azure:
    application:
      enabled: true
      tenant: trygdeetaten.no
  vault:
    enabled: true
    paths:
      - kvPath: "kv/preprod/fss/oebs-nomhendelser-t1/team-oebs"
        mountPath: "/var/run/secrets/nais.io/vault"
  ingresses:
    - "https://oebs-nomhendelser-t1.intern.dev.nav.no"