apiVersion: nais.io/v1alpha1
kind: Application

metadata:
  name: personhendelse-consumer-oebs-t1
  namespace: team-oebs
  labels:
    team: team-oebs

spec:
  image: {{ image }}
  port: 8080

  envFrom:
    - secret: personhendelse-consumer-oebs-t1
    - secret: personhendelse-consumer-oebs-t1-oracle
  env:
    - name: SPRING_PROFILES_ACTIVE
      value: gcp
    # Temporary Kafka diagnostics. Revert this block after troubleshooting.
    - name: LOGGING_LEVEL_ORG_APACHE_KAFKA
      value: DEBUG
    - name: LOGGING_LEVEL_ORG_APACHE_KAFKA_CLIENTS_CONSUMER_INTERNALS
      value: TRACE
    - name: LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_KAFKA
      value: DEBUG
    # Keep listeners explicitly enabled so one can be toggled off during isolation tests.
    - name: APP_KAFKA_NOMSHENDELSE_AUTO_STARTUP
      value: "true"
    - name: APP_KAFKA_LIVSHENDELSE_AUTO_STARTUP
      value: "true"
    # Optional group override for coordinator ACL debugging:
    # - name: SPRING_KAFKA_CONSUMER_GROUP_ID
    #   value: oebs-nomhendelser-t1

  replicas:
    min: 1
    max: 1
    cpuThresholdPercentage: 50
  liveness:
    path: /internal/isalive
    initialDelay: 60
    timeout: 10
  readiness:
    path: /internal/isready
    initialDelay: 60
    timeout: 10
  resources:
    limits:
      cpu: 768m
      memory: 768Mi
    requests:
      cpu: 200m
      memory: 512Mi
  prometheus:
    enabled: true
    path: /actuator/prometheus
  kafka:
    pool: nav-dev

  azure:
    application:
      enabled: true
      tenant: trygdeetaten.no

  observability:
    autoInstrumentation:
      enabled: true
      runtime: java
