apiVersion: nais.io/v1alpha1
kind: Application

metadata:
  name: oebs-nomhendelser-t1
  namespace: team-oebs
  labels:
    team: team-oebs

spec:
  image: {{ image }}
  port: 8080
  envFrom:
    - secret: oebs-nomhendelser-t1
  replicas:
    min: 1
    max: 1
    cpuThresholdPercentage: 50
  liveness:
    path: /internal/isalive
    initialDelay: 60
    timeout: 10
  readiness:
    path: /internal/isready
    initialDelay: 60
    timeout: 10
  resources:
    limits:
      cpu: 768m
      memory: 768Mi
    requests:
      cpu: 200m
      memory: 512Mi
  prometheus:
    enabled: true
    path: /actuator/prometheus
  kafka:
    pool: nav-dev

  azure:
    application:
      enabled: true
      tenant: trygdeetaten.no

  observability:
    autoInstrumentation:
      enabled: true
      runtime: java

  ingresses:
    - "https://oebs-nomhendelser-t1.intern.dev.nav.no"